global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: "weblaunch"

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []   # Add alertmanager here if needed

scrape_configs:

  # ── Prometheus self ────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── WebLaunch Backend ──────────────────────────────────────
  - job_name: "weblaunch-backend"
    static_configs:
      - targets: ["backend:4000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  # ── Node Exporter ─────────────────────────────────────────
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # ── cAdvisor ──────────────────────────────────────────────
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
    scrape_interval: 10s

  # ── Redis (if redis_exporter added) ───────────────────────
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
