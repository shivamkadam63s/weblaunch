---
# Playbook: Deploy or update the WebLaunch application
- name: Deploy WebLaunch Application
  hosts: weblaunch_servers
  become: true
  serial: 1  # Rolling deploy
  vars:
    app_version: "{{ lookup('env', 'APP_VERSION') | default('latest') }}"
    registry: "{{ ecr_registry | default('') }}"

  tasks:
    - name: Pull latest backend image
      community.docker.docker_image:
        name: "{{ registry }}weblaunch/backend:{{ app_version }}"
        source: pull
      when: registry != ""

    - name: Pull latest frontend image
      community.docker.docker_image:
        name: "{{ registry }}weblaunch/frontend:{{ app_version }}"
        source: pull
      when: registry != ""

    - name: Deploy with Docker Compose
      community.docker.docker_compose_v2:
        project_src: /opt/weblaunch
        pull: always
        recreate: auto
      register: compose_output

    - name: Verify backend health
      uri:
        url: "http://localhost:4000/health"
        method: GET
        status_code: 200
        timeout: 30
      retries: 5
      delay: 10
      register: health_check
      until: health_check.status == 200

    - name: Deployment summary
      debug:
        msg: "✅ Deployment successful on {{ inventory_hostname }}"
