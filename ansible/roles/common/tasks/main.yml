---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install common packages
  apt:
    name:
      - curl
      - wget
      - git
      - unzip
      - htop
      - vim
      - jq
      - net-tools
      - ca-certificates
      - gnupg
      - lsb-release
      - python3-pip
      - python3-setuptools
    state: present

- name: Set timezone to UTC
  timezone:
    name: UTC

- name: Configure sysctl for performance
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: yes
    reload: yes
  loop:
    - { name: vm.swappiness,          value: "10" }
    - { name: net.core.somaxconn,     value: "65535" }
    - { name: net.ipv4.tcp_max_syn_backlog, value: "65535" }
    - { name: fs.inotify.max_user_watches, value: "524288" }

- name: Create weblaunch system user
  user:
    name: weblaunch
    system: yes
    shell: /bin/bash
    home: /opt/weblaunch
    create_home: yes

- name: Create application directories
  file:
    path: "{{ item }}"
    state: directory
    owner: weblaunch
    group: weblaunch
    mode: "0755"
  loop:
    - /opt/weblaunch
    - /opt/weblaunch/logs
    - /opt/weblaunch/data
